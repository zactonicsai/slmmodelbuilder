# Auto-generated by SLM Data Generator
# Usage:
#   docker compose run --rm trainer bash run_all.sh   # train + convert
#   docker compose up -d ollama                        # serve
#   docker compose exec ollama ollama create my-slm -f /models/Modelfile

services:
  trainer:
    build: .
    container_name: slm-trainer
    env_file:
      - .env
    environment:
      - BASE_MODEL=Qwen/Qwen2.5-0.5B-Instruct
      - OLLAMA_MODEL_NAME=my-slm
      - QUANT=q4_k_m
      - EPOCHS=3
      - BATCH=2
      - LR=2e-4
      - LORA_R=8
      - LORA_ALPHA=16
    volumes:
      - ./data:/workspace/data
      - ./output:/workspace/output
      - hf_cache:/root/.cache/huggingface
    shm_size: "8gb"

  ollama:
    image: ollama/ollama:latest
    container_name: slm-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./output:/models:ro

volumes:
  hf_cache:
  ollama_data:
